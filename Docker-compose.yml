version: "3.9"

services:

  # DATA LAKE — MinIO
  minio:
    image: minio/minio:latest
    container_name: edf_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: edf_admin
      MINIO_ROOT_PASSWORD: edf_password_2024
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API FASTAPI — Prédiction EDF
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edf_api
    ports:
      - "8006:8000"
    environment:
      MODEL_TAG: "2021-01-01_2023-12-31"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "edf_admin"
      MINIO_SECRET_KEY: "edf_password_2024"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data:
    driver: local

# ─────────────────────────────────────────────
# COMMANDES UTILES :
#
# Tout démarrer :     docker compose up -d
# Tout arrêter :      docker compose down
# Logs API :          docker compose logs -f api
# Rebuild API :       docker compose up -d --build api
#
# URLS :
#   Swagger UI   →  http://localhost:8000/docs
#   API Health   →  http://localhost:8000/health
#   MinIO UI     →  http://localhost:9001
# ─────────────────────────────────────────────